<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清小闲 — 测试聊天</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
  header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 16px 20px; text-align: center; }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 13px; opacity: .8; margin-top: 4px; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #fff; color: #333; box-shadow: 0 1px 3px rgba(0,0,0,.1); border-bottom-left-radius: 4px; }
  .typing { align-self: flex-start; background: #fff; color: #999; padding: 12px 16px; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); font-size: 14px; border-bottom-left-radius: 4px; display: none; }
  .typing .dot { animation: blink 1.4s infinite both; }
  .typing .dot:nth-child(2) { animation-delay: .2s; }
  .typing .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }
  #input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #e0e0e0; }
  #input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
  #input-bar input:focus { border-color: #1a73e8; }
  #input-bar button { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; }
  #input-bar button:hover { background: #1557b0; }
  #input-bar button:disabled { background: #aaa; cursor: not-allowed; }
  .err { align-self: center; color: #d32f2f; font-size: 13px; background: #ffebee; padding: 8px 16px; border-radius: 8px; }
</style>
</head>
<body>
<header>
  <h1>🏫 清小闲</h1>
  <p>清华大学校园二手智能助手 · 测试页面</p>
</header>
<div id="chat"></div>
<div id="input-bar">
  <input id="input" type="text" placeholder="试试说：你好" autofocus>
  <button id="send-btn" onclick="send()">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

function addMsg(role, html) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = html;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderContent(text) {
  let html = text.replace(/\n/g, '<br>');
  return html;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addMsg('user', escapeHtml(text));

  const typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.innerHTML = '<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
  typingEl.style.display = 'block';
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer sk-thu-secondhand-2026' },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'user', content: text }],
        stream: false,
        temperature: 0.7
      })
    });
    const data = await resp.json();
    if (data.error) {
      typingEl.remove();
      addMsg('err', '❌ ' + (data.error.message || JSON.stringify(data.error)));
      sendBtn.disabled = false;
      input.focus();
      return;
    }
    const reply = data.choices?.[0]?.message?.content || '（无响应）';
    typingEl.remove();
    addMsg('assistant', renderContent(reply));
  } catch (err) {
    typingEl.remove();
    addMsg('err', '❌ 请求失败：' + err.message);
  }

  sendBtn.disabled = false;
  input.focus();
}

addMsg('assistant', '👋 你好！我是清小闲。<br><br>试试：<br>• <b>"你好"</b> — 打招呼<br>• <b>"我想卖自行车"</b> — 发布商品<br>• <b>"我想找自行车"</b> — 搜索商品');
</script>
</body>
</html>
